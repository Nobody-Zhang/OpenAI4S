name: Contributors

# Regenerate the README Community Contributors wall straight from the GitHub
# contributors API (authenticated, so it sees every attributed contributor).
# Replaces the third-party contrib.rocks image, which anonymously rate-limited
# against the API and rendered only a single avatar for this repo.

on:
  push:
    branches: [main]
    # Do not re-trigger on the workflow's own README commit.
    paths-ignore:
      - README.md
      - README_zh.md
  schedule:
    - cron: "0 3 * * 1" # weekly, Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: contributors-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Pillow (circular avatar crop)
        run: python -m pip install --quiet Pillow
      - name: Regenerate contributor wall
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python scripts/update_contributors.py
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain README.md README_zh.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md README_zh.md
            git commit -m "docs(readme): refresh community contributors [skip ci]"
            git push
          else
            echo "Community contributors already up to date."
          fi
